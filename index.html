<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gobble Guide</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<meta name="theme-color" content="#F7941D">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="apple-mobile-web-app-title" content="Gobble Guide">

</head>

<body>

<div class="container">

    <header class="hero-banner">

        <img src="images/gobble-banner.png" class="hero-banner" alt="The KAM Fam Logo">


    </header>


    </section>

    <section class="card">

        <h2>
            🎵 Official Theme Song
        </h2>

        <div class="video-wrapper">

            <iframe
                src="https://www.youtube.com/embed/W-jb4GxRmuQ"
                title="Gobble Til You Wobble Theme Song"
                allowfullscreen>
            </iframe>

        </div>

    </section>

    <section class="card">

        <h2>
            ⏳ Countdown to Sailaway
        </h2>

        <div class="countdown">

            <div class="count-box">

                <span id="days">0</span>

                <small>Days</small>

            </div>

            <div class="count-box">

                <span id="hours">0</span>

                <small>Hours</small>

            </div>

            <div class="count-box">

                <span id="minutes">0</span>

                <small>Minutes</small>

            </div>

            <div class="count-box">

                <span id="seconds">0</span>

                <small>Seconds</small>

            </div>

        </div>

    </section>

    <a href="pages/home.html" class="home-btn">
        🚢 WOBBLE TO THE FUN!
    </a>

<button id="shipModeBtn" class="home-btn">
    🚢 I AM ON THE SHIP!
</button>

<p id="offlineStatus"></p>

<p id="lastUpdated"></p>

    
    <footer>

        <p>
            Join the adventure with
        </p>

        <img src="images/kam-logo.png" class="footer-logo" alt="The KAM Fam Logo">

    </footer>

</div>

<script src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {

    window.addEventListener('load', () => {

        navigator.serviceWorker.register('./service-worker.js')

        .then(registration => {

            console.log('Gobble Guide Service Worker Registered');

        })

        .catch(error => {

            console.log(error);

        });

    });

}
</script>
</body>

</html>
