<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gobble Guide</title>

    <meta name="theme-color" content="#8B0000">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<body>

<div class="container">

    <img src="images/logo.png" class="logo" alt="Gobble Til You Wobble Logo">

    <h1>Gobble Guide</h1>

    <h2>Gobble Til You Wobble Cruise</h2>

    <p class="subtitle">
        Official Companion App
    </p>

    <div class="countdown-card">

        <div id="countdown">
            Loading Countdown...
        </div>

    </div>

<button id="themeButton">
    ▶️ Play Official Cruise Theme
</button>


<div id="themeVideo" class="video-container" style="display:none;">

    <h3>
        🎵 Official Cruise Theme
    </h3>

    <iframe
        id="youtubeVideo"
        width="100%"
        height="250"
        src=""
        title="Gobble Til You Wobble Cruise Theme"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen>
    </iframe>

</div>

    <button id="enterButton">
        🚢 Enter Gobble Guide
    </button>

    <footer>

        Presented by

        <strong>The KAM Fam</strong>

    </footer>

</div>

<script src="js/countdown.js"></script>
<script src="js/app.js"></script>

</body>
</html>
