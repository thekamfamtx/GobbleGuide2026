<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gobble Guide</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="welcome-body">

  <div class="welcome-container">

    <!-- Gobble Banner -->
    <img
      class="welcome-banner"
      src="images/gobble-banner.png"
      alt="Gobble Til You Wobble"
    />

    <!-- App Title -->
    <h1 class="welcome-title">Gobble Guide</h1>

    <!-- Dynamic Greeting -->
    <h2 class="welcome-greeting" id="welcomeGreeting">
      Welcome, Cruiser!
    </h2>

    <p class="welcome-subtitle">
      Welcome to your official cruise companion.
    </p>

    <!-- Theme Song -->
    <div class="video-card">

      <h3>🎵 Official Theme Song</h3>

      <div class="video-wrapper">

        <iframe
          src="https://www.youtube.com/embed/W-jb4GxRmuQ"
          title="Gobble Til You Wobble Theme Song"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>

        </iframe>

      </div>

    </div>

    <!-- Countdown -->
    <div class="countdown-card">

      <h3>⏳ Countdown to Sailaway</h3>

      <div class="countdown-grid">

        <div class="countdown-box">

          <span id="days">0</span>

          <label>Days</label>

        </div>

        <div class="countdown-box">

          <span id="hours">0</span>

          <label>Hours</label>

        </div>

        <div class="countdown-box">

          <span id="minutes">0</span>

          <label>Minutes</label>

        </div>

        <div class="countdown-box">

          <span id="seconds">0</span>

          <label>Seconds</label>

        </div>

      </div>

      <p class="sail-date">
        Saturday • November 21, 2026 • 10:00 AM CST
      </p>

    </div>

    <!-- Main Button -->
    <a href="pages/home.html" class="wobble-button">
      🚢 WOBBLE TO THE FUN!
    </a>

    <!-- Footer -->
    <div class="welcome-footer">

      <p>Presented by</p>

      <img
        class="footer-logo"
        src="images/kam-logo.png"
        alt="The KAM Fam"
      />

    </div>

  </div>

  <script src="js/app.js"></script>

</body>
</html>
