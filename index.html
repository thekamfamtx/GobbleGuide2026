<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gobble Guide</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <header class="hero-banner">

        <img src="images/gobble-banner.png" class="hero-banner" alt="The KAM Fam Logo">

        <h1>Gobble Guide</h1>

        <p class="subtitle">
            Your Official Gobble Til You Wobble Cruise Companion
        </p>

    </header>

    <section class="card">

        <h2 id="greeting">
            Welcome Cruiser!
        </h2>

        <p>
            We can't wait to sail with you aboard the Gobble Til You Wobble Cruise!
        </p>

    </section>

    <section class="card">

        <h2>
            🎵 Official Theme Song
        </h2>

        <div class="video-wrapper">

            <iframe
                src="https://www.youtube.com/embed/W-jb4GxRmuQ"
                title="Gobble Til You Wobble Theme Song"
                allowfullscreen>
            </iframe>

        </div>

    </section>

    <section class="card">

        <h2>
            ⏳ Countdown to Sailaway
        </h2>

        <div class="countdown">

            <div class="count-box">

                <span id="days">0</span>

                <small>Days</small>

            </div>

            <div class="count-box">

                <span id="hours">0</span>

                <small>Hours</small>

            </div>

            <div class="count-box">

                <span id="minutes">0</span>

                <small>Minutes</small>

            </div>

            <div class="count-box">

                <span id="seconds">0</span>

                <small>Seconds</small>

            </div>

        </div>

    </section>

    <a href="pages/home.html" class="home-btn">
        🚢 WOBBLE TO THE FUN!
    </a>

    <footer>

        <p>
            Hosted by
        </p>

        <img src="images/kam-logo.png" class="footer-logo" alt="The KAM Fam Logo">

    </footer>

</div>

<script src="js/app.js"></script>

</body>

</html>
</body>
</html>
